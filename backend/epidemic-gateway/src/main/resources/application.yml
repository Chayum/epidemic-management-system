server:
  port: 8080

spring:
  application:
    name: epidemic-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.213.130:8848
      config:
        server-addr: 192.168.213.130:8848
        file-extension: yaml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/login
          filters:
            - StripPrefix=1
            - LoginToken
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**, /api/auth/**
          filters:
            - StripPrefix=1
        - id: material-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/material/**, /api/inventory/**, /api/donation/**, /api/application/**, /api/stats/**
          filters:
            - StripPrefix=1
        - id: pandemic-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/pandemic/**
          filters:
            - StripPrefix=1

jwt:
  secret: epidemic-material-management-secret-key-2024-super-secret
  expiration: 604800000

auth:
  whitelist:
    - /api/auth/login
    - /api/auth/register
    - /doc.html
    - /swagger-ui.html
    - /webjars/**
    - /v3/api-docs/**
