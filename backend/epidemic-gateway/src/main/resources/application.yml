spring:
  application:
    name: epidemic-gateway
  config:
    import: optional:classpath:common-config.yml
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/login
          filters:
            - StripPrefix=1
            - LoginToken
        - id: auth-logout
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/logout
          filters:
            - StripPrefix=1
            - LogoutToken
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**, /api/auth/**
          filters:
            - StripPrefix=1
        - id: material-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/material/**, /api/inventory/**, /api/donation/**, /api/application/**, /api/stats/**, /api/stock/**
          filters:
            - StripPrefix=1
        - id: pandemic-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/pandemic/**, /api/notification/**
          filters:
            - StripPrefix=1

server:
  port: 8080

jwt:
  secret: epidemic-material-management-secret-key-2024-super-secret
  expiration: 7200000

auth:
  whitelist:
    - /api/auth/login
    - /api/auth/register
    - /doc.html
    - /swagger-ui.html
    - /webjars/**
    - /v3/api-docs/**