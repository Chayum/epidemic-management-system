server:
  port: 8080

spring:
  application:
    name: epidemic-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.150.100:8848
      config:
        server-addr: 192.168.150.100:8848
        file-extension: yaml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/login
          filters:
            - StripPrefix=1
            - LoginToken
        - id: auth-logout
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/logout
          filters:
            - StripPrefix=1
            - LogoutToken
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**, /api/auth/**
          filters:
            - StripPrefix=1
        - id: material-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/material/**, /api/inventory/**, /api/donation/**, /api/application/**, /api/stats/**, /api/stock/**
          filters:
            - StripPrefix=1
        - id: pandemic-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/pandemic/**, /api/notification/**
          filters:
            - StripPrefix=1
  data:
    redis:
          host: 192.168.150.100
          port: 6379
          password:
          database: 0
          timeout: 5000ms
          lettuce:
            pool:
              max-active: 8
              max-idle: 8
              min-idle: 0
              max-wait: -1ms

jwt:
  secret: epidemic-material-management-secret-key-2024-super-secret
  expiration: 7200000

auth:
  whitelist:
    - /api/auth/login
    - /api/auth/register
    - /doc.html
    - /swagger-ui.html
    - /webjars/**
    - /v3/api-docs/**

