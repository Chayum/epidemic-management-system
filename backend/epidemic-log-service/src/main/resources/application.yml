spring:
  application:
    name: epidemic-log-service
  config:
    import: optional:classpath:common-config.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.150.100:3306/epidemic_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

server:
  port: 8084

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.epidemic.log.entity
  global-config:
    db-config:
      id-type: auto

# 开启 Swagger
springdoc:
  api-docs:
    enabled: true