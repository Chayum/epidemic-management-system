# ==================== Redis 公共配置 ====================
spring:
  data:
    redis:
      host: 192.168.150.100
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# ==================== Nacos 公共配置 ====================
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.150.100:8848
      config:
        server-addr: 192.168.150.100:8848
        file-extension: yaml
        import-check:
          enabled: false

# ==================== MyBatis 公共配置 ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Knife4j 公共配置 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
  production: false

# ==================== Knife4j SpringDoc 公共配置 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ==================== 日志公共配置 ====================
logging:
  level:
    com.epidemic: info