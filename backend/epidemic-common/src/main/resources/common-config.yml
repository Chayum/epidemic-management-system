# ==================== Redis 公共配置 ====================
spring:
  data:
    redis:
      host: 192.168.150.100
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# ==================== RabbitMQ 公共配置 ====================
  rabbitmq:
    host: 192.168.150.100
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 消息确认机制
    publisher-confirm-type: correlated   # 发布确认
    publisher-returns: true              # 发布返回
    # 消费者配置
    listener:
      simple:
        acknowledge-mode: manual         # 手动确认
        prefetch: 10                     # 预取数量
        retry:
          enabled: true                  # 启用重试
          max-attempts: 3                # 最大重试3次
          initial-interval: 1000         # 初始间隔1秒
          multiplier: 2                  # 间隔倍增
          max-interval: 10000            # 最大间隔10秒

# ==================== Nacos 公共配置 ====================
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.150.100:8848
      config:
        server-addr: 192.168.150.100:8848
        file-extension: yaml
        import-check:
          enabled: false

# ==================== MyBatis 公共配置 ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Knife4j 公共配置 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
  production: false

# ==================== Knife4j SpringDoc 公共配置 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ==================== 日志公共配置 ====================
logging:
  level:
    com.epidemic: info